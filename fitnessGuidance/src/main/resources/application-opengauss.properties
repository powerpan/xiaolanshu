spring.application.name=fitnessGuidance

# Replace host, port, database, username, and password with the target openGauss environment.
spring.datasource.url=jdbc:opengauss://127.0.0.1:5432/xiaolanshu
spring.datasource.username=gaussdb
spring.datasource.password=gaussdb
spring.datasource.driver-class-name=org.opengauss.Driver

# openGauss uses the standalone SQL import file in database/opengauss-init.sql.
spring.sql.init.mode=never
spring.h2.console.enabled=false

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
